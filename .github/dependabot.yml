version: 2

updates:
  # uv ecosystem for pyproject.toml + uv.lock
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Don't update hail - pinned at CPG's installed version
      - dependency-name: "hail"
      # Don't update Python version
      - dependency-name: "python"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
