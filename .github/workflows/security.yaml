name: Security Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    name: Pip Audit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 #v7.6.0

      - name: Install project dependencies
        run: |
          uv sync
          source .venv/bin/activate

      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 #v1.1.0
        with:
          virtual-environment: .venv
          summary: true
          ignore-vulns: |
            GHSA-8qvm-5x2c-j2w7  # Denial of service in protobuf=3.20.2; hail pins this version.

  package-scanner:
    runs-on: ubuntu-latest
    name: Python Package Scanner
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
        with:
          persist-credentials: false

      - uses: populationgenomics/python-package-scanner@7db0863f7646dcd34df1ee5f2911149f67628eb3 # v0
        with:
          mode: uv
          fail-on-vulns: false
          comment-on-pr: true

  zizmor:
    name: Zizmor Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 #v7.6.0

      - name: Run zizmor 🌈
        run: uvx zizmor@1.6.0 --format=sarif . > results.sarif

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: zizmor
