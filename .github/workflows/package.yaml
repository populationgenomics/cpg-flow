name: Publish
on:
  release:
    types:
      - created

  workflow_dispatch:
    inputs:
      force_pypi_release:
        description: 'Force PyPi publish'
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  publish:
    name: Publish
    environment: production
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 #v7.6.0
        with:
          enable-cache: false

      - name: Install project dependencies
        run: uv sync

      - name: Build package
        run: uv build --sdist --wheel

      - name: Publish | Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e #v1.13.0

      - name: Publish | Update docs version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          VERSION="${TAG_NAME#v}"
          if [ -z "$VERSION" ]; then
            VERSION=$(uv version --short)
          fi
          uv run mike deploy -F docs/mkdocs.yml --push --alias-type=redirect --update-aliases "$VERSION" latest
          uv run mike set-default -F docs/mkdocs.yml --push latest
