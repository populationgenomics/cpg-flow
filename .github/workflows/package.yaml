name: Publish
on:
  release:
    types:
      - created

  workflow_dispatch:
    inputs:
      force_pypi_release:
        description: 'Force PyPi publish'
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  publish:
    name: Publish
    environment: production
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca #v6.0.1
        with:
          enable-cache: false

      - name: Install project dependencies
        run: uv sync

      - name: Build package
        run: uv build --sdist --wheel

      - name: Publish | Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e #v1.13.0

      - name: Publish | Update docs version
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          uv run mike deploy -F docs/mkdocs.yml --push --alias-type=redirect --update-aliases "${VERSION#v}" latest
          uv run mike set-default -F docs/mkdocs.yml --push latest
