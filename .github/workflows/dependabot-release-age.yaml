name: Dependabot Release Age Check

on:
  pull_request:
    types: [opened, synchronize]

permissions: {}

jobs:
  check-release-age:
    name: Check Release Age
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
        with:
          persist-credentials: false

      - name: Check release ages
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python .github/scripts/check_release_age.py > comment.md

      - name: Post comment
        if: steps.check.outcome == 'success' && hashFiles('comment.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s comment.md ]; then
            gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body-file comment.md
          fi
