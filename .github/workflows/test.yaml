name: Test
on:
  push:
    branches: [main]  # Run on push to main branch
  pull_request:       # Trigger on PRs (from fork or same repo)
  workflow_dispatch:  # Allow manual triggering

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: 'true'
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 #v7.6.0

      - name: Install project dev dependencies
        run: uv sync --only-dev

      - name: Run unit tests
        id: runtests
        timeout-minutes: 20
        run: |
          rc=0
          uv run coverage run -m pytest tests --junitxml=test-execution.xml || rc=$?
          uv run coverage xml
          echo "rc=$rc" >> $GITHUB_OUTPUT

      - name: 'Save coverage report as an Artifact'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v4.3.0
        with:
          name: coverage-report
          path: ./coverage.xml

      - name: 'Save execution report as an Artifact'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v4.3.0
        with:
          name: execution-report
          path: ./test-execution.xml

      - name: Fail if unit tests are not passing
        if: ${{ steps.runtests.outputs.rc != 0}}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd #v8.0.0
        env:
          rc: ${{ steps.runtests.outputs.rc }}
        with:
          script: |
            core.setFailed(`Unittests failed with rc = ${process.env.rc}`)

  sonarqube:
    name: SonarQube scan
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 #v7.6.0
        with:
          enable-cache: false

      - name: Extract version from pyproject.toml
        id: version
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: 'Download coverage and execution report'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #8.0.1
        with:
          pattern: '*-report'

      - name: Move downloaded reports to root
        run: |
          mv *-report/* .

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 #v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_GLOBAL_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          PROJECT_VERSION: ${{ steps.version.outputs.version }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectVersion="$PROJECT_VERSION"

      - name: SonarQube Quality Gate
        id: quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  #v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_GLOBAL_TOKEN }}
